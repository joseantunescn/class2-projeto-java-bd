version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_bd_produtos
    environment:
      POSTGRES_DB: bd-produtos
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: coti
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_bd_produtos
    environment:
      PGADMIN_DEFAULT_EMAIL: coti@email.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
